services:
  - type: web
    name: spend-sense-backend
    env: python
    plan: standard
    pythonVersion: 3.10
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10
      - key: DEBUG
        value: false
      - key: API_HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
    disk:
      name: model-cache
      mountPath: /opt/render/models
      sizeGB: 10
